# =============================================================
# docker-compose.yml — Traffic Signal Optimization Environment
# =============================================================
version: "3.9"

services:
  traffic-signal-env:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: traffic-signal-env:latest
    container_name: traffic-signal-env
    restart: unless-stopped
    ports:
      - "7860:7860"
    env_file:
      - .env                    # supply API keys here — not baked into the image
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/')"]
      interval: 30s
      timeout: 10s
      start-period: 30s
      retries: 3
    # Resource limits matching openenv.yaml requirements (min 2GB RAM, 1 vCPU)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
